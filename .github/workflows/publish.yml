name: Publish

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  verify-version:
    name: Verify pubspec version matches tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Compare tag and pubspec.yaml version
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$REF_TYPE" != "tag" ]; then
            echo "::error::This workflow must be dispatched on a tag ref (got ref_type=$REF_TYPE, ref_name=$REF_NAME)"
            exit 1
          fi
          if ! printf '%s\n' "$REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag name '$REF_NAME' does not match expected pattern vX.Y.Z"
            exit 1
          fi
          tag_version="${REF_NAME#v}"
          pubspec_version="$(awk '/^version:/ {print $2; exit}' pubspec.yaml)"
          if [ "$tag_version" != "$pubspec_version" ]; then
            echo "::error::Tag version ($tag_version) does not match pubspec.yaml version ($pubspec_version)"
            exit 1
          fi
          echo "Tag and pubspec.yaml versions match: $tag_version"

  publish:
    name: Publish to pub.dev
    needs: verify-version
    runs-on: ubuntu-24.04
    environment: pub.dev
    permissions:
      id-token: write # Required for OIDC authentication with pub.dev.
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: portone-io/flutter-action@a762656fdb1095ef947e0dcac6472d4ccb1e9934
        with:
          channel: stable
          flutter-version: 3.38.x

      - name: Setup Dart (for pub.dev OIDC)
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260

      - name: Install dependencies
        run: flutter pub get

      - name: Dry-run publish
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        run: dart pub publish --force
